name: flutter_ads_lib
description: A unified Flutter ads library supporting AdMob, Facebook Audience Network, Unity Ads, and AppLovin with a simple plug-and-play API.
version: 1.0.0
repository: https://github.com/JonEl1502/flutter_ads_lib
issue_tracker: https://github.com/JonEl1502/flutter_ads_lib/issues

environment:
  sdk: ">=3.0.0 <4.0.0"
  flutter: ">=3.10.0"

dependencies:
  flutter:
    sdk: flutter
  google_mobile_ads: ^5.3.0
  # facebook_audience_network removed — abandoned at 1.0.1, fails the AGP
  # namespace check on modern Android Gradle Plugin. FacebookAdapter is now
  # a no-op stub.
  unity_ads_plugin: ^0.3.12
  applovin_max: ^4.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
